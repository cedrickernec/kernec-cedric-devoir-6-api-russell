# ==========================================================
# USERS - PASSWORD UPDATE
# ----------------------------------------------------------
# Permet la modification du mot de passe
# d'un utilisateur spécifique.
#
# Objectif :
# - Sécuriser la mise à jour des credentials
# - Valider l'ancien mot de passe si nécessaire
#
# Paramètre requis :
# - id (Identifiant MongoDB)
#
# Route protégée par JWT.
# ==========================================================

put:
  tags: [Users]
  summary: Modifier le mot de passe
  description: Met à jour le mot de passe d'un utilisateur.
  
  parameters:
    - name: id
      in: path
      required: true
      description: Identifiant MongoDB de l'utilisateur
      schema:
        type: string
        example: 69694b3fda5fa0c48294315a

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/UserUpdatePasswordRequest"

  responses:
    "200":
      description: Mot de passe mis à jour
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/SuccessMessageResponse"

    "400":
      description: Erreur de validation ou champ non autorisé
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/ErrorResponse"
          examples:
            fieldNotAllowed:
              $ref: "../../openapi.yaml#/components/examples/FieldNotAllowed"

            missingFields:
              summary: Champs requis manquants
              value:
                success: false
                message: Le nouveau mot de passe est requis.
                  
            passwordSameAsOld:
              summary: Nouveau mot de passe identique
              value:
                success: false
                message: Le nouveau mot de passe doit être différent de l'ancien.

            invalidFormat:
              summary: Format invalide
              value:
                success: false
                message: Donnée(s) invalide(s).
                errors:
                    minLength: 8 caractères minimum requis
                    lowercase: 1 lettre minuscule requise
                    uppercase: 1 lettre majuscule requise
                    number: 1 chiffre requis
                    special: 1 caractère spécial requis

    "401":
      $ref: "../../openapi.yaml#/components/responses/AuthError401"

    "404":
      description: Utilisateur introuvable
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/NotFoundResource"
          examples:
            ResourceNotFound:
              $ref: "../../openapi.yaml#/components/examples/UserNotFound"

    "500":
      $ref: "../../openapi.yaml#/components/responses/InternalServerError500"