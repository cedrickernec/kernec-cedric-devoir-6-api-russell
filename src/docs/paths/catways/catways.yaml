# ==========================================================
# CATWAYS - COLLECTION
# ----------------------------------------------------------
# Gestion de la collection des catways.
#
# Permet :
# - Récupérer la liste complète des catways
# - Créer un nouveau catway
#
# Routes protégées par JWT.
# ==========================================================

# ==========================================================
# GET ALL CATWAYS
# ==========================================================
get:
  tags: [Catways]
  summary: Liste des catways
  description: Récupère la liste complète des catways.

  responses:
    "200":
      description: Liste récupérée
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/CatwayListResponse"

    "401":
      $ref: "../../openapi.yaml#/components/responses/AuthError401"

    "500":
      $ref: "../../openapi.yaml#/components/responses/InternalServerError500"

# ==========================================================
# CREATE CATWAY
# ==========================================================
post:
  tags: [Catways]
  summary: Créer un catway
  description: Crée un nouveau catway.
  
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../openapi.yaml#/components/schemas/CatwayCreateRequest"

  responses:
    "201":
      description: Catway créé
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/CatwayCreateResponse"

    "400":
      description: Erreur de validation ou champ non autorisé
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/ErrorResponse"
          examples:
            fieldNotAllowed:
              $ref: "../../openapi.yaml#/components/examples/FieldNotAllowed"

            missingFields:
              summary: Champs requis manquants
              value:
                success: false
                message: Donnée(s) invalide(s).
                errors:
                  catwayNumber: "Champ obligatoire manquant : Numéro de catway"
                  catwayType: "Champ obligatoire manquant : Type de catway"
                  catwayState: "Champ obligatoire manquant : État du catway"

            invalidNumber:
              $ref: "../../openapi.yaml#/components/examples/InvalidNumber"

            invalidInteger:
              $ref: "../../openapi.yaml#/components/examples/InvalidInteger"

            invalidMinimum:
              $ref: "../../openapi.yaml#/components/examples/InvalidMinimum"

            invalidCatwayType:
              summary: Type de catway invalide
              value:
                success: false
                message: Donnée(s) invalide(s).
                errors:
                  catwayType: "Type de catway invalide. Valeurs autorisées : short ou long"

    "401":
      $ref: "../../openapi.yaml#/components/responses/AuthError401"

    "409":
      description: Conflit d'unicité
      content:
        application/json:
          schema:
            $ref: "../../openapi.yaml#/components/schemas/ErrorResponse"
          examples:
            uniquenessConflict:
              summary: Conflit de catway
              value:
                success: false
                message: Impossible de créer le catway.
                errors:
                  catwayNumber: Un catway avec ce numéro existe déjà.
                conflictWith:
                  catway:
                    id: 699ce49b3990671881a87cca
                    catwayNumber: 2
                    catwayType: short
                    catwayState: bon état
                    isOutOfService: false

    "500":
      $ref: "../../openapi.yaml#/components/responses/InternalServerError500"