# ==========================================================
# COMMON SCHEMAS - PASSWORD RULES
# ----------------------------------------------------------
# Schéma de mot de passe fort utilisé pour les opérations :
# - nécessitant une confirmation de mot de passe,
#   comme la suppression d'une réservation.
# - de création ou de mise à jour d'un compte utilisateur.
#
# Critères de mot de passe :
# - Minimum 8 caractères
# - Au moins une lettre majuscule
# - Au moins une lettre minuscule
# - Au moins un chiffre
# - Au moins un caractère spécial
# ==========================================================

type: string
format: password
minLength: 8
pattern: "^(?=.*[A-Z])(?=.*[a-z])(?=.*\\d)(?=.*[!@#$%^&*()\\-_=+\\[\\]{};:,.?]).+$"
example: Password123!