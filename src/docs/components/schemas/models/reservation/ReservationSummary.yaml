# ==========================================================
# RESERVATION SUMMARY MODEL SCHEMA
# ----------------------------------------------------------
# Représente la structure métier d'une réservation
# retourné par l’API (version synthétique - liste).
# ==========================================================

description: 
  Version synthétique d'une réservation retournée par l'API
  dans une réponse de type liste.
type: object
required: [
  id,
  catwayNumber,
  clientName,
  boatName,
  status,
  startDate,
  endDate,
  createdAt,
  updatedAt
]

properties:
  id:
    description: Identifiant unique MongoDB
    type: string
    example: 699ce49b3990671881a87cca

  catwayNumber:
    description: Numéro de catway associé
    type: integer
    minimum: 1
    example: 21

  clientName:
    description: Nom du client
    type: string
    example: John Doe

  boatName:
    description: Nom du bateau
    type: string
    example: L'Atlantide

  status:
    $ref: "../../../../openapi.yaml#/components/schemas/ReservationStatusModel"

  startDate:
    description: Date de début de réservation
    type: string
    format: date-time
    example: 2026-01-12T00:06:00.000Z

  endDate:
    description: Date de fin de réservation
    type: string
    format: date-time
    example: 2026-01-14T00:06:00.000Z

  createdAt:
    description: Date de création
    type: string
    format: date-time
    example: 2026-01-08T12:55:05.016Z

  updatedAt:
    description: Date de dernière modification
    type: string
    format: date-time
    example: 2026-01-09T18:24:32.845Z
