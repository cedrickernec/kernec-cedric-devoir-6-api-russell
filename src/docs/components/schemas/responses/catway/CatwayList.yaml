# ==========================================================
# CATWAY LIST RESPONSE SCHEMA
# ----------------------------------------------------------
# Réponse standardisée pour la récupération
# de la liste des catways.
#
# Contient :
# - success
# - count
# - data (array de Catway)
# ==========================================================

description: Structure standardisée des réponses de récupération d'une liste de catways.
type: object
required: [success, count, data]

properties:
  success:
    type: boolean
    example: true

  count:
    type: integer
    example: 24

  data:
    type: array
    items:
      $ref: "../../../../openapi.yaml#/components/schemas/CatwayModel"