# ==========================================================
# RESERVATION BULK DELETE RESPONSE SCHEMA
# ----------------------------------------------------------
# Réponse standardisée après suppression d’une sélection
# de réservations (suppression en masse).
#
# Contient :
# - success
# - data (nombre de réservations)
# ==========================================================

description:
  Structure standardisée des réponses de suppression
  d'une sélection de réservations (suppression en masse).
type: object
required: [success, message, data]

properties:
  success:
    type: boolean
    example: true
  
  message:
    type: string
    example: 3 réservations supprimées avec succès.

  data:
    type: object
    required: [count]

    properties:
      count:
        type: integer
        example: 3